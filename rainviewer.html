<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>RainViewer Radar · Atlas Weather API Lab</title>
  <link rel="preconnect" href="https://unpkg.com" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="styles.css?v=0.2.1" />
</head>
<body>
  <main class="lab-shell map-shell" data-page="rainviewer">
    <header class="map-header">
      <a class="shell-button" href="index.html" aria-label="Back to lab home">‹</a>
      <div class="title-box">
        <p class="eyebrow">Provider test</p>
        <h1>RainViewer radar</h1>
      </div>
      <a class="shell-button" href="openmeteo.html" aria-label="Next test">›</a>
    </header>

    <nav class="mini-nav" aria-label="Weather lab pages">
      <a class="is-active" href="rainviewer.html">Radar</a>
      <a href="openmeteo.html">Sites</a>
      <a href="metoffice.html">Met Office</a>
      <a href="ea-rainfall.html">Gauges</a>
    </nav>

    <div id="map" class="map"></div>

    <section class="mode-pill is-on">
      <span class="mode-pulse" aria-hidden="true">🌧</span>
      <strong>RADAR BLOB TEST</strong>
    </section>

    <section class="floating-panel provider-panel" id="providerPanel">
      <div class="panel-head panel-head-with-action">
        <span class="hazard-icon" aria-hidden="true">🌧</span>
        <div>
          <p class="eyebrow">UK-wide overlay</p>
          <h2>RainViewer tile layer</h2>
        </div>
        <button class="panel-close-button" id="panelCloseButton" type="button" aria-label="Close RainViewer controls">×</button>
      </div>
      <p id="statusText">Load the latest radar frames, then scrub the timeline and compare the blobs with Met Office.</p>
      <div class="button-stack">
        <button class="primary-action" id="loadRadarButton">Load radar frames</button>
        <button class="secondary-action" id="clearRadarButton">Clear overlay</button>
      </div>
      <label class="range-row" for="radarFrameRange">
        <span>Frame</span>
        <input id="radarFrameRange" type="range" min="0" max="0" value="0" />
        <strong id="radarTimeLabel">—</strong>
      </label>
      <label class="range-row" for="radarOpacityRange">
        <span>Opacity</span>
        <input id="radarOpacityRange" type="range" min="10" max="95" value="68" />
        <strong id="radarOpacityLabel">68%</strong>
      </label>
      <div class="source-note">Best question: does this look close enough for the Atlas weather blob layer?</div>
    </section>

    <button class="panel-open-button" id="panelOpenButton" type="button" hidden>
      <span aria-hidden="true">🌧</span>
      <strong>Radar controls</strong>
    </button>
  </main>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="app.js?v=0.2.0"></script>
  <script src="rainviewer.js?v=0.2.1"></script>
</body>
</html>
